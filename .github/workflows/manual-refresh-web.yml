name: Manual Refresh BNUZ Feed V2

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      BNUZ_FEED_SNAPSHOT_MAX_ATTEMPTS: 30
      BNUZ_FEED_SNAPSHOT_RETRY_DELAY_MS: 5000
      BNUZ_FEED_SNAPSHOT_TIMEOUT_MS: 30000
      BNUZ_FEED_SNAPSHOT_BROWSER_TIMEOUT_MS: 30000
      BNUZ_FEED_SNAPSHOT_BROWSER_HOSTS: www.bnuzh.edu.cn
      BNUZ_FEED_SNAPSHOT_CONCURRENCY: 3
      BNUZ_FEED_SNAPSHOT_TARGET_CONCURRENCY: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Resolve Vite base path
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          if [ "$repo_name" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/${repo_name}/" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Generate snapshot data
        run: |
          npm run snapshot
          node scripts/check-snapshot-health.cjs

      - name: Build web app
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: pages-deploy
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
