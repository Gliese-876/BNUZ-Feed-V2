name: Deploy BNUZ Feed V2 to GitHub Pages

on:
  schedule:
    - cron: "0 18,2,10 * * *"
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BNUZ_FEED_SNAPSHOT_MAX_ATTEMPTS: 10
      BNUZ_FEED_SNAPSHOT_RETRY_DELAY_MS: 5000
      BNUZ_FEED_SNAPSHOT_TIMEOUT_MS: 30000
      BNUZ_FEED_SNAPSHOT_CONCURRENCY: 4
      BNUZ_FEED_SNAPSHOT_TARGET_CONCURRENCY: 1
      BNUZ_FEED_SNAPSHOT_CI_RUN_LIMIT: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Resolve Vite base path
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          if [ "$repo_name" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/${repo_name}/" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Generate snapshot data
        shell: bash
        run: |
          max_runs="${BNUZ_FEED_SNAPSHOT_CI_RUN_LIMIT:-3}"

          for run_index in $(seq 1 "$max_runs"); do
            echo "Snapshot run ${run_index}/${max_runs}"
            npm run snapshot

            if node scripts/check-snapshot-health.cjs; then
              echo "Snapshot reached live-only state."
              exit 0
            fi

            if [ "$run_index" -lt "$max_runs" ]; then
              echo "Snapshot still has partial/degraded sources, retrying full run after cooldown."
              sleep 15
            fi
          done

          echo "Snapshot did not converge to live-only state within ${max_runs} full runs."
          exit 1

      - name: Build web app
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: pages-deploy
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
